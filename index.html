<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Guido Tomasella — Data Manager &amp; Tech Lead</title>
    <meta
      name="description"
      content="Data Manager & Tech Lead. I lead data quality, governance and engineering — and amplify all of it with AI and agents."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <!-- WebGL stage (single canvas for the whole journey) -->

        <h1 class="hero__name" data-anim></h1>
        <p class="hero__tagline" data-anim></p>
        <p class="hero__hint" data-anim>Drag to explore · hover the nodes</p>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
