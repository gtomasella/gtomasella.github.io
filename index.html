<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guido Tomasella — Data Manager &amp; Tech Lead</title>
    <meta
      name="description"
      content="Data Manager & Tech Lead. I lead data quality, governance and engineering — and amplify all of it with AI and agents."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="cursor" class="cursor" aria-hidden="true"></div>
    <div id="cursor-ring" class="cursor-ring" aria-hidden="true"></div>

    <!-- WebGL stage (single canvas for the whole journey) -->
    <div id="webgl"></div>
    <div class="vignette" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="#hero" aria-label="Guido Tomasella — home">GT</a>
      <nav class="nav">
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
      </nav>
      <a class="topbar__cta" href="#contact">Let's talk</a>
    </header>

    <!-- DOM content overlays the canvas; populated from content/content.en.json -->
    <main id="overlay">
      <section class="hero" id="hero">
        <p class="hero__kicker" data-anim></p>
        <h1 class="hero__name" data-anim></h1>
        <p class="hero__tagline" data-anim></p>
      </section>
    </main>

    <div class="scrollcue" aria-hidden="true">
      <span>Scroll</span>
      <span class="scrollcue__line"></span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
